<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLLI Site Search</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-title" content="CLLI Search" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.18);
      --highlight: #fde047;
      --row-hover: #243044;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    header { margin-bottom: 22px; }

    h1 {
      font-size: 1.7rem;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0;
    }

    .search-box {
      position: relative;
      margin-top: 20px;
    }

    #search {
      width: 100%;
      padding: 24px 64px 24px 26px;
      font-size: 1.55rem;
      color: var(--text);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #search::placeholder { color: var(--muted); }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .clear-btn {
      position: absolute;
      top: 50%;
      right: 18px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .clear-btn:hover { color: var(--text); background: var(--border); }
    .clear-btn.show { display: flex; }

    .origin-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .loc-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #04263a;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .loc-btn:hover { background: #7dd3fc; }
    .loc-btn svg { flex-shrink: 0; }

    .origin-form { display: flex; gap: 6px; flex: 1 1 200px; }
    .origin-form input {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
    }
    .origin-form input:focus { border-color: var(--accent); }
    .origin-form button {
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
    }
    .origin-form button:hover { background: var(--border); }

    .origin-status {
      flex-basis: 100%;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .origin-status strong { color: var(--accent); }

    th.dist-col, td.dist-cell { white-space: nowrap; }
    td.dist-cell .val { font-weight: 700; color: var(--accent); }

    .maps-pref {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pref-btn {
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
    }
    .pref-btn:hover { border-color: var(--accent); }
    .pref-btn.active {
      color: #04263a;
      background: var(--accent);
      border-color: var(--accent);
    }

    .map-bar { margin-top: 12px; }
    .map-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .map-toggle:hover { background: var(--row-hover); border-color: var(--accent); }
    .map-toggle svg { color: var(--accent); flex-shrink: 0; }

    .map-wrap {
      display: none;
      height: 62vh;
      min-height: 340px;
      margin: 6px 0 4px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
    }
    .map-wrap.show { display: block; }

    .map-pop { font-size: 0.86rem; line-height: 1.45; color: #1e293b; }
    .map-pop b { color: #0c4a6e; font-size: 0.95rem; }
    .map-pop .dir-btn { margin-top: 8px; }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 2px 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .sort-bar label { white-space: nowrap; }
    .sort-bar select {
      flex: 0 1 auto;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .sort-bar select:focus { outline: none; border-color: var(--accent); }
    .sort-dir {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .sort-dir:hover { border-color: var(--accent); }
    .sort-dir svg { color: var(--accent); flex-shrink: 0; }

    .status {
      margin: 14px 2px 10px;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.1em;
    }
    .status strong { color: var(--accent); }

    .results { margin-top: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border-radius: 12px;
      overflow: hidden;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 12px 14px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }

    tbody tr:hover { background: var(--row-hover); }

    td.clli {
      font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    mark {
      background: var(--highlight);
      color: #1a1a1a;
      padding: 0;
      border-radius: 2px;
    }

    th.dir-col, td.dir-cell {
      width: 1%;
      white-space: nowrap;
      text-align: right;
    }

    .dir-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #04263a;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .dir-btn:hover { background: #7dd3fc; }
    .dir-btn:active { transform: translateY(1px); }
    .dir-btn svg { flex-shrink: 0; }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      background: var(--panel);
      border-radius: 12px;
      border: 1px dashed var(--border);
    }
    .empty .big { font-size: 2rem; margin-bottom: 8px; }

    footer {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .version-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }
    .version-badge {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 11px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    /* Responsive: stack columns into cards on narrow screens */
    @media (max-width: 640px) {
      thead { display: none; }
      table { background: transparent; }
      tbody tr {
        display: block;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 10px;
        padding: 6px 4px;
      }
      tbody td {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-top: none;
        padding: 6px 14px;
      }
      tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        flex-shrink: 0;
      }
      td.clli { text-align: right; }
      td.dir-cell {
        width: 100%;
        justify-content: center;
        padding-top: 10px;
        padding-bottom: 10px;
      }
      td.dir-cell::before { content: none; }
      .dir-btn { padding: 10px 18px; font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="version-bar">
      <span class="version-badge" id="versionBadge"></span>
    </div>
    <header>
      <div class="search-box">
        <input
          id="search"
          type="text"
          placeholder="Start typing to search sites…"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Search CLLI sites"
        />
        <button class="clear-btn" id="clear" title="Clear search" aria-label="Clear search">&times;</button>
      </div>

      <div class="origin-bar">
        <button class="loc-btn" id="locBtn" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
          Use my location
        </button>
        <form class="origin-form" id="originForm">
          <input id="originInput" type="text"
                 placeholder="or enter a ZIP / address" aria-label="Origin ZIP or address" />
          <button type="submit">Go</button>
        </form>
        <span class="origin-status" id="originStatus">Sort sites by distance from you.</span>
      </div>

      <div class="maps-pref">
        <span>Directions open in:</span>
        <button type="button" class="pref-btn" data-pref="apple">Apple Maps</button>
        <button type="button" class="pref-btn" data-pref="google">Google Maps</button>
      </div>

      <div class="map-bar">
        <button type="button" class="map-toggle" id="mapToggle" aria-expanded="false">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
          <span id="mapToggleText">Show map of all sites</span>
        </button>
      </div>
    </header>

    <div class="status" id="status"></div>
    <div class="map-wrap" id="mapView"></div>

    <div class="sort-bar" id="sortBar">
      <label for="sortBy">Sort by</label>
      <select id="sortBy">
        <option value="relevance">Relevance</option>
        <option value="distance">Distance</option>
        <option value="CLLI">CLLI</option>
        <option value="Address">Address</option>
        <option value="City">City</option>
        <option value="State">State</option>
        <option value="ZIP">ZIP</option>
        <option value="Site Name">Site Name</option>
        <option value="GeoLoc">GeoLoc</option>
      </select>
      <button type="button" class="sort-dir" id="sortDir" aria-label="Toggle sort direction">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4l4 4H8v12H6V8H3l4-4zm9 16l-4-4h3V4h2v12h3l-4 4z"/></svg>
        <span id="sortDirText">A–Z</span>
      </button>
    </div>

    <div class="results" id="results"></div>

    <footer>
      CLLIsearch <span id="footerVersion"></span> &middot;
      <span id="total-count"></span> sites &middot; source: cllisites.xlsx
    </footer>
  </div>

  <script src="data.js"></script>
  <script>
    (function () {
      const searchEl = document.getElementById("search");
      const clearEl = document.getElementById("clear");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");
      const totalCountEl = document.getElementById("total-count");
      const locBtnEl = document.getElementById("locBtn");
      const originFormEl = document.getElementById("originForm");
      const originInputEl = document.getElementById("originInput");
      const originStatusEl = document.getElementById("originStatus");
      const mapToggleEl = document.getElementById("mapToggle");
      const mapToggleTextEl = document.getElementById("mapToggleText");
      const mapViewEl = document.getElementById("mapView");
      const sortBarEl = document.getElementById("sortBar");
      const sortByEl = document.getElementById("sortBy");
      const sortDirEl = document.getElementById("sortDir");
      const sortDirTextEl = document.getElementById("sortDirText");

      // Sort state. "relevance" = the smart default (distance when a location
      // is set, else best-match for a search, else spreadsheet order).
      var sortKey = "relevance", sortDir = "asc";

      // Bump APP_VERSION on every change so the badge tells you which build you
      // are actually running (handy for spotting a stale browser cache).
      const APP_VERSION = "1.0.6";
      const APP_BUILD = "2026-06-15";
      document.getElementById("versionBadge").textContent =
        "v" + APP_VERSION + " · " + APP_BUILD;
      document.getElementById("footerVersion").textContent =
        "v" + APP_VERSION + " · " + APP_BUILD;

      totalCountEl.textContent = SITES.length;

      // Pre-compute a lowercase haystack per site for fast, case-insensitive,
      // any-column partial matching.
      const INDEX = SITES.map(function (site) {
        const blob = COLUMNS.map(function (c) { return site[c] || ""; })
          .join("  ")
          .toLowerCase();
        return { site: site, blob: blob };
      });

      // Result ranking: a row scores by the highest-priority column that one of
      // its search terms matches. Lower score = better match = listed first.
      // Any column not listed here ranks last.
      const RANK_ORDER = ["CLLI", "Address", "GeoLoc", "ZIP", "City", "State", "Site Name"];

      function rankScore(site, terms) {
        for (var ci = 0; ci < RANK_ORDER.length; ci++) {
          var val = (site[RANK_ORDER[ci]] || "").toLowerCase();
          for (var ti = 0; ti < terms.length; ti++) {
            if (val.indexOf(terms[ti]) !== -1) return ci;
          }
        }
        return RANK_ORDER.length;
      }

      // ---- Distance / origin ------------------------------------------------
      // The user's origin (their device location, or a typed ZIP/address).
      // Null until set; once set, results gain a Distance column and sort
      // nearest-first.
      var originLat = null, originLon = null;

      // Map view state (Leaflet is lazy-loaded the first time the map opens).
      var mapState = { inited: false, lib: false, map: null, userMarker: null };

      // ZIP -> [lat, lon], built from the site data so a typed site-area ZIP
      // resolves instantly with no network call.
      var ZIP_MAP = {};
      SITES.forEach(function (s) {
        if (s.ZIP && s.lat != null && !(s.ZIP in ZIP_MAP)) ZIP_MAP[s.ZIP] = [s.lat, s.lon];
      });

      function haversineMiles(la1, lo1, la2, lo2) {
        var R = 3958.7613, toRad = function (d) { return d * Math.PI / 180; };
        var dLa = toRad(la2 - la1), dLo = toRad(lo2 - lo1);
        var a = Math.sin(dLa / 2) * Math.sin(dLa / 2) +
                Math.cos(toRad(la1)) * Math.cos(toRad(la2)) *
                Math.sin(dLo / 2) * Math.sin(dLo / 2);
        return 2 * R * Math.asin(Math.sqrt(a));
      }

      function distanceMiles(site) {
        if (originLat === null || site.lat == null) return null;
        return haversineMiles(originLat, originLon, site.lat, site.lon);
      }

      function formatDistance(site) {
        var d = distanceMiles(site);
        if (d === null) return "—";
        var txt = (d < 10 ? d.toFixed(1) : Math.round(d).toString()) + " mi";
        return site.geoApprox ? "≈ " + txt : txt;
      }

      function setOrigin(lat, lon, label) {
        originLat = lat;
        originLon = lon;
        originStatusEl.innerHTML =
          "Sorting by distance from <strong>" + escapeHtml(label) + "</strong>.";
        update();
        if (mapState.inited) {
          updateUserMarker();
          if (mapViewEl.classList.contains("show")) fitMap();
        }
      }

      function requestGeolocation() {
        if (!navigator.geolocation) {
          originStatusEl.textContent =
            "This browser can't share location — enter a ZIP or address.";
          return;
        }
        originStatusEl.textContent = "Locating you…";
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            setOrigin(pos.coords.latitude, pos.coords.longitude, "your location");
          },
          function (err) {
            originStatusEl.innerHTML =
              "Couldn't get your location (" + escapeHtml(err.message) +
              "). The location button needs the https site; otherwise enter a ZIP / address.";
          },
          { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
        );
      }

      function resolveOrigin(text) {
        text = (text || "").trim();
        if (!text) return;
        // Site-area ZIP: resolve instantly from embedded data (no network).
        if (/^\d{5}$/.test(text) && ZIP_MAP[text]) {
          setOrigin(ZIP_MAP[text][0], ZIP_MAP[text][1], text);
          return;
        }
        // Anything else: OpenStreetMap (CORS-enabled, unlike the Census API).
        originStatusEl.textContent = "Looking up “" + text + "”…";
        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=us&q=" +
              encodeURIComponent(text))
          .then(function (r) { return r.json(); })
          .then(function (a) {
            if (a && a[0]) setOrigin(parseFloat(a[0].lat), parseFloat(a[0].lon), text);
            else originStatusEl.textContent = "Couldn't find “" + text + "”. Try a ZIP code.";
          })
          .catch(function () {
            originStatusEl.textContent = "Lookup failed — check your connection, or type a nearby ZIP.";
          });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function highlight(text, query) {
        const safe = escapeHtml(text);
        if (!query) return safe;
        // Highlight every case-insensitive occurrence of the query.
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return safe.replace(new RegExp("(" + escaped + ")", "ig"), "<mark>$1</mark>");
      }

      // Inline navigation/send arrow icon for the Directions button.
      const DIR_ICON =
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
        '<path d="M21.7 2.3a1 1 0 0 0-1.05-.23l-18 7a1 1 0 0 0 .08 1.88l7.46 2.32 2.32 7.46a1 1 0 0 0 .9.7h.05a1 1 0 0 0 .92-.63l7-18a1 1 0 0 0-.23-1.05z"/></svg>';

      // True on iPhone/iPad, so Directions can open Apple Maps (the iOS default
      // map app) instead of Google Maps.
      const IS_APPLE = (function () {
        const ua = navigator.userAgent || "";
        const iOS = /iPad|iPhone|iPod/.test(ua);
        // iPadOS 13+ reports as a Mac; tell it apart by its touch screen.
        const iPadOS = navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;
        return iOS || iPadOS;
      })();

      // Which map app the Directions buttons open. Defaults to the detected
      // platform, but the user can override it (saved across visits) — which
      // also makes it work in desktop "phone mode", where the device can't be
      // detected from the user-agent.
      var mapPref = (function () {
        try {
          var v = localStorage.getItem("clliMapPref");
          if (v === "apple" || v === "google") return v;
        } catch (e) {}
        return IS_APPLE ? "apple" : "google";
      })();

      // Build the Directions <a> for a site. On iOS/iPadOS it links to Apple
      // Maps so the default Maps app opens; everywhere else to Google Maps
      // (which opens the Maps app on Android, web on desktop). Directions start
      // from the user's current location.
      function directionsLink(site) {
        const stateZip = [site.State, site.ZIP].filter(Boolean).join(" ");
        const dest = [site.Address, site.City, stateZip].filter(Boolean).join(", ");
        const enc = encodeURIComponent(dest);
        let href, attrs;
        if (mapPref === "apple") {
          href = "https://maps.apple.com/?daddr=" + enc + "&dirflg=d";
          // On a real iOS device the link hands off to the Maps app in place,
          // so skip target="_blank" (which would leave an empty Safari tab).
          // Anywhere else (e.g. testing on desktop), open a new tab instead.
          attrs = IS_APPLE ? "" : ' target="_blank" rel="noopener noreferrer"';
        } else {
          href = "https://www.google.com/maps/dir/?api=1&destination=" + enc;
          attrs = ' target="_blank" rel="noopener noreferrer"';
        }
        // &amp; so the URL stays valid inside the HTML attribute.
        return '<a class="dir-btn" href="' + href.replace(/&/g, "&amp;") + '"' + attrs +
          ' title="Get directions to ' + escapeHtml(site.Address) + '">' +
          DIR_ICON + "Directions</a>";
      }

      function render(matches, query) {
        if (matches.length === 0) {
          resultsEl.innerHTML =
            '<div class="empty"><div class="big">🔍</div>' +
            "No sites match <strong>&ldquo;" + escapeHtml(query) + "&rdquo;</strong>.<br>" +
            "Try a different CLLI, city, address, or ZIP.</div>";
          return;
        }

        var haveOrigin = originLat !== null;
        let html = "<table><thead><tr>";
        if (haveOrigin) html += '<th class="dist-col">Distance</th>';
        COLUMNS.forEach(function (c) { html += "<th>" + escapeHtml(c) + "</th>"; });
        html += '<th class="dir-col"></th>';
        html += "</tr></thead><tbody>";

        matches.forEach(function (site) {
          html += "<tr>";
          if (haveOrigin) {
            html += '<td class="dist-cell" data-label="Distance"><span class="val">' +
              formatDistance(site) + "</span></td>";
          }
          COLUMNS.forEach(function (c) {
            const cls = c === "CLLI" ? ' class="clli"' : "";
            html +=
              "<td" + cls + ' data-label="' + escapeHtml(c) + '">' +
              '<span class="val">' + highlight(site[c] || "", query) + "</span>" +
              "</td>";
          });
          html +=
            '<td class="dir-cell" data-label="">' + directionsLink(site) + "</td>";
          html += "</tr>";
        });

        html += "</tbody></table>";
        resultsEl.innerHTML = html;
      }

      // Compare two sites by a specific column (for the Sort-by dropdown).
      function compareSites(a, b, key) {
        if (key === "distance") {
          var da = distanceMiles(a), db = distanceMiles(b);
          if (da === null && db === null) return 0;
          if (da === null) return 1;
          if (db === null) return -1;
          return da - db;
        }
        if (key === "ZIP") {
          return (parseInt(a.ZIP, 10) || 0) - (parseInt(b.ZIP, 10) || 0);
        }
        var va = (a[key] || "").toLowerCase(), vb = (b[key] || "").toLowerCase();
        return va < vb ? -1 : va > vb ? 1 : 0;
      }

      function updateSortDirLabel() {
        var asc = sortDir === "asc";
        if (sortKey === "distance") sortDirTextEl.textContent = asc ? "Near→Far" : "Far→Near";
        else if (sortKey === "ZIP") sortDirTextEl.textContent = asc ? "0–9" : "9–0";
        else sortDirTextEl.textContent = asc ? "A–Z" : "Z–A";
      }

      function update() {
        const raw = searchEl.value.trim();
        const query = raw.toLowerCase();
        clearEl.classList.toggle("show", raw.length > 0);

        // Filter: empty query shows all; otherwise every whitespace-separated
        // term must match somewhere in the row (any column, partial, any case).
        const terms = query ? query.split(/\s+/).filter(Boolean) : [];
        let matches;
        if (!terms.length) {
          matches = SITES.slice();
        } else {
          matches = INDEX.filter(function (entry) {
            return terms.every(function (t) { return entry.blob.indexOf(t) !== -1; });
          }).map(function (entry) { return entry.site; });
        }

        const haveOrigin = originLat !== null;
        // Distance only makes sense with a location set.
        sortByEl.querySelector('option[value="distance"]').disabled = !haveOrigin;
        if (sortKey === "distance" && !haveOrigin) {
          sortKey = "relevance";
          sortByEl.value = "relevance";
          updateSortDirLabel();
        }

        if (sortKey === "relevance") {
          // Smart default: distance when located, else best-match for a search,
          // else spreadsheet order. Z–A simply reverses that order.
          if (haveOrigin) {
            const distOf = new Map();
            matches.forEach(function (s) { distOf.set(s, distanceMiles(s)); });
            matches.sort(function (a, b) {
              var da = distOf.get(a), db = distOf.get(b);
              if (da === null) da = Infinity;
              if (db === null) db = Infinity;
              if (da !== db) return da - db;
              return rankScore(a, terms) - rankScore(b, terms);
            });
          } else if (terms.length) {
            const scoreOf = new Map();
            matches.forEach(function (s) { scoreOf.set(s, rankScore(s, terms)); });
            matches.sort(function (a, b) { return scoreOf.get(a) - scoreOf.get(b); });
          }
          if (sortDir === "desc") matches.reverse();
        } else {
          // Explicit column sort, with the A–Z / Z–A direction applied.
          const f = sortDir === "asc" ? 1 : -1;
          matches.sort(function (a, b) { return f * compareSites(a, b, sortKey); });
        }

        if (!terms.length) {
          statusEl.innerHTML =
            "Showing all <strong>" + SITES.length + "</strong> sites.";
        } else {
          statusEl.innerHTML =
            "<strong>" + matches.length + "</strong> " +
            (matches.length === 1 ? "site" : "sites") +
            " matching &ldquo;" + escapeHtml(raw) + "&rdquo;.";
        }

        // Highlight only single-term queries to keep marks accurate.
        render(matches, terms.length === 1 ? raw : "");
      }

      searchEl.addEventListener("input", update);
      clearEl.addEventListener("click", function () {
        searchEl.value = "";
        searchEl.focus();
        update();
      });

      locBtnEl.addEventListener("click", requestGeolocation);
      originFormEl.addEventListener("submit", function (e) {
        e.preventDefault();
        resolveOrigin(originInputEl.value);
      });

      // Map-app toggle: highlight the active choice, persist it, and re-render
      // so existing Directions links switch provider immediately.
      const prefBtns = Array.prototype.slice.call(document.querySelectorAll(".pref-btn"));
      function applyMapPref() {
        prefBtns.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-pref") === mapPref);
        });
      }
      prefBtns.forEach(function (b) {
        b.addEventListener("click", function () {
          mapPref = b.getAttribute("data-pref");
          try { localStorage.setItem("clliMapPref", mapPref); } catch (e) {}
          applyMapPref();
          update();
        });
      });
      applyMapPref();

      // ---- Map view ---------------------------------------------------------
      function loadLeaflet(cb) {
        if (window.L) { cb(); return; }
        if (mapState.lib) return;
        mapState.lib = true;
        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
        document.head.appendChild(css);
        var js = document.createElement("script");
        js.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        js.onload = cb;
        js.onerror = function () {
          mapState.lib = false;
          mapViewEl.innerHTML =
            '<div style="padding:24px;color:var(--muted);text-align:center">' +
            "Couldn't load the map — check your internet connection, then try again.</div>";
        };
        document.head.appendChild(js);
      }

      function sitePopup(site) {
        var d = (originLat !== null && site.lat != null)
          ? "<br>" + formatDistance(site) + " away" : "";
        return '<div class="map-pop"><b>' + escapeHtml(site.CLLI) + "</b><br>" +
          escapeHtml(site["Site Name"]) + "<br>" +
          escapeHtml(site.Address) + ", " + escapeHtml(site.City) + " " +
          escapeHtml(site.ZIP) + d + "<br>" + directionsLink(site) + "</div>";
      }

      function initMap() {
        mapState.map = L.map(mapViewEl, { scrollWheelZoom: true });
        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
          attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
          subdomains: "abcd", maxZoom: 19
        }).addTo(mapState.map);
        SITES.forEach(function (s) {
          if (s.lat == null) return;
          L.circleMarker([s.lat, s.lon], {
            radius: 6, color: "#0ea5e9", weight: 2,
            fillColor: "#38bdf8", fillOpacity: 0.85
          }).bindPopup(sitePopup(s)).addTo(mapState.map);
        });
        mapState.inited = true;
      }

      function updateUserMarker() {
        if (!mapState.inited || originLat === null) return;
        if (mapState.userMarker) {
          mapState.userMarker.setLatLng([originLat, originLon]);
        } else {
          mapState.userMarker = L.circleMarker([originLat, originLon], {
            radius: 8, color: "#ffffff", weight: 3,
            fillColor: "#f43f5e", fillOpacity: 1
          }).bindPopup("You are here").addTo(mapState.map);
        }
      }

      function fitMap() {
        if (!mapState.inited) return;
        var pts;
        if (originLat !== null) {
          pts = SITES.filter(function (s) { return s.lat != null; })
            .map(function (s) { return { s: s, d: distanceMiles(s) }; })
            .sort(function (a, b) { return a.d - b.d; })
            .slice(0, 10).map(function (n) { return [n.s.lat, n.s.lon]; });
          pts.push([originLat, originLon]);
        } else {
          pts = SITES.filter(function (s) { return s.lat != null; })
            .map(function (s) { return [s.lat, s.lon]; });
        }
        if (pts.length) mapState.map.fitBounds(pts, { padding: [40, 40] });
      }

      function openMap() {
        mapViewEl.classList.add("show");
        resultsEl.style.display = "none";
        sortBarEl.style.display = "none";
        mapToggleTextEl.textContent = "Hide map";
        mapToggleEl.setAttribute("aria-expanded", "true");
        loadLeaflet(function () {
          if (!mapState.inited) initMap();
          updateUserMarker();
          mapState.map.invalidateSize();
          fitMap();
        });
      }

      function closeMap() {
        mapViewEl.classList.remove("show");
        resultsEl.style.display = "";
        sortBarEl.style.display = "";
        mapToggleTextEl.textContent = "Show map of all sites";
        mapToggleEl.setAttribute("aria-expanded", "false");
      }

      mapToggleEl.addEventListener("click", function () {
        if (mapViewEl.classList.contains("show")) closeMap();
        else openMap();
      });

      // Sort controls: dropdown picks the field, the button flips A–Z / Z–A.
      sortByEl.addEventListener("change", function () {
        sortKey = sortByEl.value;
        updateSortDirLabel();
        update();
      });
      sortDirEl.addEventListener("click", function () {
        sortDir = sortDir === "asc" ? "desc" : "asc";
        updateSortDirLabel();
        update();
      });
      updateSortDirLabel();

      // Initial render: show everything, then try to grab the user's location
      // so the list sorts by distance automatically.
      update();
      searchEl.focus();
      requestGeolocation();
    })();
  </script>
</body>
</html>
